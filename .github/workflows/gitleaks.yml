name: Gitleaks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege: only what actions/checkout needs.
# gitleaks-action with our config (no PR comments, no SARIF upload) needs nothing more.
permissions:
  contents: read

jobs:
  scan:
    name: Scan for leaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is NOT required for public repos.
