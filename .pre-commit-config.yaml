# Pre-commit hooks: scan for leaks + strip notebook outputs before each commit.
#
# One-time setup per clone:
#   uvx pre-commit install
#
# Run on all files (e.g. after a manual sweep):
#   uvx pre-commit run --all-files

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=2048']

  # Local hook: scans for specific literals (name, personal email, exact
  # allocation ID) using a gitignored .gitleaks.local.toml. Silently skips
  # if the file is absent, so it costs nothing on machines without it.
  # Requires `gitleaks` in PATH (`brew install gitleaks` on Mac).
  - repo: local
    hooks:
      - id: gitleaks-local-literals
        name: gitleaks (local literals; Mac-only)
        entry: bash -c 'if [ -f .gitleaks.local.toml ]; then gitleaks protect --staged --config .gitleaks.local.toml --no-banner --redact; fi'
        language: system
        pass_filenames: false
        always_run: true
