model:
  name: mistralai/Mistral-7B-Instruct-v0.3
  dtype: bfloat16

peft:
  method: dora
  r: 8
  alpha: 16
  target_modules: all-linear
  dropout: 0.05

data:
  dataset: boolq
  train_size: 2000
  eval_size: 500
  max_length: 512

training:
  batch_size: 4
  grad_accum: 4
  learning_rate: 5e-5
  num_steps: 500
  warmup_steps: 50
  eval_every: 100
  seed: 42

output:
  run_id: dora_mistral7b_boolq_r8
